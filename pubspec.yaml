name: chatx
description: ChatX - Modern Messenger App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core & Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  
  # Storage & Databases
  firebase_database: ^10.4.0
  firebase_storage: ^11.6.0
  shared_preferences: ^2.2.2
  
  # UI & Design System (Lean & Premium)
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.1
  
  # State Management (Added to fix build errors)
  flutter_bloc: ^8.1.3
  
  # Media Processing
  image: ^4.1.7               
  http: ^1.2.1                
  
  # File Management & Utils
  file_picker: ^8.0.0         
  path_provider: ^2.1.2       
  path: ^1.9.0
  uuid: ^4.3.3                
  intl: ^0.18.1
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
