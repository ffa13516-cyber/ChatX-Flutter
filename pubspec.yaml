name: chatx
description: ChatX - Modern Messenger App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # تم تحديث الحزم لتتوافق مع أحدث بيئة تشغيل وتجنب التعارض
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  firebase_database: ^10.5.0
  firebase_storage: ^11.7.0
  shared_preferences: ^2.2.3
  
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  
  flutter_bloc: ^8.1.5
  
  http: ^1.2.1                
  path_provider: ^2.1.3       
  path: ^1.9.0
  uuid: ^4.4.0                
  intl: ^0.19.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


