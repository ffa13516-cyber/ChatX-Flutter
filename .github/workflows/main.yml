name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          mkdir -p temp_project/assets/images
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/

      - name: Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

      - name: Fix gradle for Firebase
        run: |
          cat > temp_project/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          echo "apply plugin: 'com.google.gms.google-services'" >> temp_project/android/app/build.gradle

      - name: Get packages
        run: cd temp_project && flutter pub get

      - name: Create keystore
        run: |
          cd temp_project/android
          keytool -genkey -v -keystore app/keystore.jks \
            -alias chatx -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass chatx123 -keypass chatx123 \
            -dname "CN=ChatX, OU=ChatX, O=ChatX, L=Cairo, S=Cairo, C=EG"
          cat > key.properties << 'EOF'
          storePassword=chatx123
          keyPassword=chatx123
          keyAlias=chatx
          storeFile=keystore.jks
          EOF

      - name: Add signing config to build.gradle
        run: |
          cd temp_project/android
          cat > app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('key.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.chatx.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.chatx.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      keyAlias 'chatx'
                      keyPassword 'chatx123'
                      storeFile file('keystore.jks')
                      storePassword 'chatx123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
          }
          apply plugin: 'com.google.gms.google-services'
          EOF

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/**/*.apk
          retention-days: 7
