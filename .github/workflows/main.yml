name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          if [ -d "assets" ]; then cp -r assets temp_project/; fi

      - name: Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

      - name: Fix gradle for Firebase
        run: |
          cat > temp_project/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          echo "apply plugin: 'com.google.gms.google-services'" >> temp_project/android/app/build.gradle

      - name: Ensure minSdkVersion 21 in app/build.gradle
        run: |
          cd temp_project/android/app
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' build.gradle
          if ! grep -q 'minSdkVersion' build.gradle; then
            sed -i '/defaultConfig {/a\    minSdkVersion 21' build.gradle
          fi

      - name: Get packages
        run: cd temp_project && flutter pub get

      - name: Build APK
        run: cd temp_project && flutter build apk --debug --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Debug
          path: |
            temp_project/**/*.apk
          retention-days: 7
