name: Build ChatX Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Prepare Project
        run: |
          flutter create --org com.chatx temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          [ -d assets ] && cp -r assets temp_project/
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

      - name: Configure Gradle
        run: |
          cat > temp_project/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "apply plugin: 'com.google.gms.google-services'" >> temp_project/android/app/build.gradle
          # ضبط minSdkVersion بطريقة مضمونة
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' temp_project/android/app/build.gradle
          if ! grep -q 'minSdkVersion' temp_project/android/app/build.gradle; then
            sed -i '/defaultConfig {/a\        minSdkVersion 21' temp_project/android/app/build.gradle
          fi

      - name: Build Release APKs
        run: |
          cd temp_project
          flutter pub get
          flutter build apk --release --split-per-abi --no-pub

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/app/outputs/flutter-apk/*.apk
