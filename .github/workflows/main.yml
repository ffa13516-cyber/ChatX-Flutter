name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name chatx temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          mkdir -p temp_project/assets/images

      - name: Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

      - name: Add Firebase plugin
        run: |
          cd temp_project
          sed -i '/^    defaultConfig {/i\    apply plugin: "com.google.gms.google-services"' android/app/build.gradle
          sed -i "s/dependencies {/dependencies {\n        classpath 'com.google.gms:google-services:4.4.0'/" android/build.gradle

      - name: Get Flutter packages
        run: cd temp_project && flutter pub get

      - name: Build APK
        run: cd temp_project && flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Flutter-Debug
          path: temp_project/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
