name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          mkdir -p temp_project/assets/images

      - name: Setup Firebase & Fix Gradle Plugins
        run: |
          cd temp_project/android
          
          # تعديل ملف build.gradle الرئيسي لإضافة كلاس باث جوجل سيرفسز في البداية
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'com.google.gms:google-services:4.4.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # إضافة ملف google-services.json وتفعيل الـ Plugin في ملف الـ App
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo "apply plugin: 'com.google.gms.google-services'" >> app/build.gradle

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Configure Signing & Keystore
        run: |
          cd temp_project/android/app
          keytool -genkey -v -keystore keystore.jks \
            -alias chatx -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass chatx123 -keypass chatx123 \
            -dname "CN=ChatX, OU=ChatX, O=ChatX, L=Cairo, S=Cairo, C=EG"
          
          # إضافة إعدادات التوقيع داخل ملف build.gradle
          cat >> build.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      keyAlias 'chatx'
                      keyPassword 'chatx123'
                      storeFile file('keystore.jks')
                      storePassword 'chatx123'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          EOF

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
