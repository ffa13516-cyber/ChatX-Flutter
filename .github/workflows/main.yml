name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Architect Clean Environment & Setup
        run: |
          # 1. تنظيف مسارات الأندرويد القديمة وأي مشاريع مؤقتة
          rm -rf android/ temp_project/
          
          # 2. بناء مجلد الأندرويد من الصفر في المسار الرئيسي باسم المشروع الصحيح
          flutter create . --org com.chatx --project-name chatx
          
          # 3. خطوة استباقية: حقن صلاحية الإنترنت لضمان عمل Firebase
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 4. إعداد Google Services بشكل آمن
          cd android
          if [ -f "settings.gradle.kts" ]; then
            sed -i '/id("org.jetbrains.kotlin.android")/a \    id("com.google.gms.google-services") version "4.3.15" apply false' settings.gradle.kts
            sed -i '/id("com.android.application")/a \    id("com.google.gms.google-services")' app/build.gradle.kts
          elif [ -f "settings.gradle" ]; then
            sed -i '/id "org.jetbrains.kotlin.android"/a \    id "com.google.gms.google-services" version "4.3.15" apply false' settings.gradle
            sed -i '/id "com.android.application"/a \    id "com.google.gms.google-services"' app/build.gradle
          fi
          
          # 5. حقن ملف الجيسون الخاص بـ Firebase
          cd ..
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Clean and Get Packages
        run: |
          flutter clean
          flutter pub get
          flutter pub upgrade

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-APK
          path: build/app/outputs/flutter-apk/app-release.apk
