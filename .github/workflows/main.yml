name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11' # رجعنا لجاوا 11 للتوافق مع النسخ القديمة
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0' # نسخة مستقرة جداً مع المكتبات القديمة
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          mkdir -p temp_project/assets/images

      - name: Setup Firebase & Legacy Fix
        run: |
          cd temp_project/android
          
          # مسح وكتابة ملف build.gradle بنظام قديم يرضي الـ Plugins
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.6.10'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.1.0'
                  classpath 'com.google.gms:google-services:4.3.10'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          # ضبط الـ Gradle Wrapper لنسخة تتوافق مع 7.1.0
          sed -i 's/gradle-.*-all.zip/gradle-7.2-all.zip/' gradle/wrapper/gradle-wrapper.properties
          
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo "apply plugin: 'com.google.gms.google-services'" >> app/build.gradle

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
