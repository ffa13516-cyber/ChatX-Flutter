name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Clean Project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/
          cd temp_project/android
          if [ -f "settings.gradle.kts" ]; then
            sed -i '/id("org.jetbrains.kotlin.android")/a \    id("com.google.gms.google-services") version "4.3.15" apply false' settings.gradle.kts
            sed -i '/id("com.android.application")/a \    id("com.google.gms.google-services")' app/build.gradle.kts
          elif [ -f "settings.gradle" ]; then
            sed -i '/id "org.jetbrains.kotlin.android"/a \    id "com.google.gms.google-services" version "4.3.15" apply false' settings.gradle
            sed -i '/id "com.android.application"/a \    id "com.google.gms.google-services"' app/build.gradle
          fi
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          cd ..
          cat >> android/build.gradle << 'EOF'

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion 36
            }
        }
    }
}
EOF

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Upgrade packages
        run: |
          cd temp_project
          flutter pub upgrade

      - name: Build Release APK
        run: |
