name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          mkdir -p temp_project/assets/images

      - name: Setup Firebase & Ultimate Kotlin Fix
        run: |
          cd temp_project/android
          
          # تعديل ملف build.gradle الرئيسي لفرض نسخة Kotlin حديثة جداً
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.10'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath 'com.google.gms:google-services:4.4.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
              subprojects {
                  afterEvaluate { project ->
                      if (project.hasProperty('android')) {
                          project.android {
                              if (namespace == null) {
                                  namespace project.group
                              }
                          }
                      }
                  }
              }
          }
          EOF
          
          # تفعيل الفايربيز ورفع الـ Compile SDK لـ 34 عشان المكتبات الحديثة
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' app/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> app/build.gradle
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/app/outputs/flutter-apk/*.apk
