name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Prepare Clean Project
        run: |
          # 1. إنشاء مشروع فلاتر نظيف بالهيكل الرسمي
          flutter create --org com.chatx --project-name app temp_project
          
          # 2. نقل ملفاتك (الكود الخاص بيك) للمشروع الجديد
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/   # ✅ ده التعديل المهم
          
          cd temp_project/android
          
          # 3. التعديل الجراحي لنسخ الكوتلن والجرادل داخل ملفات فلاتر الأصلية
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.8.22" apply false/' settings.gradle
          sed -i 's/id "com.android.application" version .*/id "com.android.application" version "7.4.2" apply false/' settings.gradle
          sed -i 's/gradle-.*-all.zip/gradle-7.5-all.zip/' gradle/wrapper/gradle-wrapper.properties
          
          # 4. إضافة ملفات الفايربيز بالطريقة الصحيحة لنسخة فلاتر 3.19
          sed -i '/id "org.jetbrains.kotlin.android"/a \    id "com.google.gms.google-services" version "4.3.15" apply false' settings.gradle
          sed -i '/id "com.android.application"/a \    id "com.google.gms.google-services"' app/build.gradle
          
          # إنشاء ملف الجيسون الخاص بـ Firebase
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-APK
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
