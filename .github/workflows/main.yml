name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          mkdir -p temp_project/assets/images
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/

      - name: Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

      - name: Fix Android gradle for Firebase
        run: |
          cat > temp_project/android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          echo "" >> temp_project/android/app/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> temp_project/android/app/build.gradle

      - name: Get Flutter packages
        run: cd temp_project && flutter pub get

      - name: Build APK with Gradle directly
        run: |
          cd temp_project/android
          ./gradlew assembleDebug
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Flutter-Debug
          path: temp_project/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
