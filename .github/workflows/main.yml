name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare Clean Project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
          cp -r assets temp_project/
          cd temp_project/android
          if [ -f "settings.gradle.kts" ]; then
            sed -i '/id("org.jetbrains.kotlin.android")/a \    id("com.google.gms.google-services") version "4.3.15" apply false' settings.gradle.kts
            sed -i '/id("com.android.application")/a \    id("com.google.gms.google-services")' app/build.gradle.kts
          elif [ -f "settings.gradle" ]; then
            sed -i '/id "org.jetbrains.kotlin.android"/a \    id "com.google.gms.google-services" version "4.3.15" apply false' settings.gradle
            sed -i '/id "com.android.application"/a \    id "com.google.gms.google-services"' app/build.gradle
          fi
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo '' >> build.gradle
          echo 'subprojects {' >> build.gradle
          echo '    afterEvaluate { project ->' >> build.gradle
          echo '        if (project.hasProperty("android")) {' >> build.gradle
          echo '            project.android {' >> build.gradle
          echo '                compileSdkVersion 36' >> build.gradle
          echo '            }' >> build.gradle
          echo '        }' >> build.gradle
          echo '    }' >> build.gradle
          echo '}' >> build.gradle

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Upgrade packages
        run: |
          cd temp_project
          flutter pub upgrade

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-APK
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
