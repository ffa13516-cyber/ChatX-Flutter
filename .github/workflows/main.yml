name: Build ChatX Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org com.chatx --project-name app temp_project
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/

      - name: Setup Firebase & Stable Gradle
        run: |
          cd temp_project/android
          
          # استخدام نسخة Gradle مستقرة جداً وأقدم قليلاً لضمان التوافق مع المكتبات
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.7.10'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath 'com.google.gms:google-services:4.3.14'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # ضبط الـ Gradle Wrapper لنسخة 7.5 (متوافقة مع Gradle Plugin 7.3.0)
          sed -i 's/gradle-.*-all.zip/gradle-7.5-all.zip/' gradle/wrapper/gradle-wrapper.properties
          
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo "apply plugin: 'com.google.gms.google-services'" >> app/build.gradle

      - name: Get packages
        run: |
          cd temp_project
          flutter pub get

      - name: Configure Signing
        run: |
          cd temp_project/android/app
          keytool -genkey -v -keystore keystore.jks -alias chatx -keyalg RSA -keysize 2048 -validity 10000 -storepass chatx123 -keypass chatx123 -dname "CN=ChatX, OU=ChatX, O=ChatX, L=Cairo, S=Cairo, C=EG"
          cat >> build.gradle << 'EOF'
          android {
              signingConfigs { release { keyAlias 'chatx'; keyPassword 'chatx123'; storeFile file('keystore.jks'); storePassword 'chatx123' } }
              buildTypes { release { signingConfig signingConfigs.release } }
          }
          EOF

      - name: Build Release APK
        run: |
          cd temp_project
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatX-Release
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
