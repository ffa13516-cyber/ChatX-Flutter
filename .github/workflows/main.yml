name: Build ChatX Flutter APK

on:
push:
branches: [ main, master ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.19.0'
      channel: 'stable'

  - name: Create Flutter project
    run: |
      flutter create --org com.chatx --project-name app temp_project
      mkdir -p temp_project/assets/images
      cp -r lib temp_project/
      cp pubspec.yaml temp_project/

  - name: Setup google-services.json
    run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > temp_project/android/app/google-services.json

  - name: Fix gradle for Firebase
    run: |
      cat > temp_project/android/build.gradle << 'EOF'
      buildscript {
          ext.kotlin_version = '1.9.22'
          repositories {
              google()
              mavenCentral()
          }
          dependencies {
              classpath 'com.android.tools.build:gradle:8.2.2'
              classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              classpath 'com.google.gms:google-services:4.4.1'
          }
      }

      allprojects {
          repositories {
              google()
              mavenCentral()
          }
      }
      EOF

      sed -i "/android {/a\\
          compileOptions {\\
              sourceCompatibility JavaVersion.VERSION_17\\
              targetCompatibility JavaVersion.VERSION_17\\
          }\\
          kotlinOptions {\\
              jvmTarget = '17'\\
          }" temp_project/android/app/build.gradle

      echo "apply plugin: 'com.google.gms.google-services'" >> temp_project/android/app/build.gradle

  - name: Get packages
    run: cd temp_project && flutter pub get

  - name: Create keystore
    run: |
      cd temp_project/android
      keytool -genkey -v -keystore app/keystore.jks \
        -alias chatx -keyalg RSA -keysize 2048 -validity 10000 \
        -storepass chatx123 -keypass chatx123 \
        -dname "CN=ChatX, OU=ChatX, O=ChatX, L=Cairo, S=Cairo, C=EG"
      cat > key.properties << 'EOF'
      storePassword=chatx123
      keyPassword=chatx123
      keyAlias=chatx
      storeFile=keystore.jks
      EOF

  - name: Add signing config
    run: |
      cd temp_project/android/app
      cat >> build.gradle << 'EOF'

      android.signingConfigs {
          release {
              keyAlias 'chatx'
              keyPassword 'chatx123'
              storeFile file('keystore.jks')
              storePassword 'chatx123'
          }
      }
      android.buildTypes.release.signingConfig = android.signingConfigs.release
      android.buildTypes.release.minifyEnabled = false
      android.buildTypes.release.shrinkResources = false
      EOF

  - name: Build Release APK
    run: |
      cd temp_project
      flutter build apk --release --no-tree-shake-icons

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: ChatX-Release
      path: temp_project/build/**/*.apk
      retention-days: 7
